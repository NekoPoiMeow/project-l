; Standard mode tempo:
; - Frequent small/medium waves instead of one huge blob.
; - Base-lane waves pressure tentacle base.
; - Side-lane waves keep home defense relevant.
; - Random player harassment keeps walking/skills relevant.
; - Trash is weaker/faster and gives less single-unit reward; total reward comes from throughput.

