[stage]
id="Battle_00"
duration=720
map_size="3200,2133"
background="res://scenes/Battle/Battle_00/Background.png"
block_mask="res://scenes/Battle/Battle_00/Collision.png"
block_alpha_limit=0.1
; MVP debug/render budget. 99999 was letting waves accumulate forever and made the
; post-merge build stall around ~200 bodies. Keep it high enough for 300+ screen tests
; but low enough that the batch/logic budget can actually hold.
max_active_entities_soft=360
bio_texture="res://scenes/Battle/Battle_00/Bio.png"
win_condition="destroy_enemy_base"

[leveling]
start_level=1
level_cap=12
xp_curve="4,9,16,25,36,50,66,85,108,134,164"

[player]
entity_id="000"
spawn="PlayerSpawn"

[tentacle_base]
entity_id="001"
spawn="TentacleBaseSpawn"
worker_entity_id="020"
worker_spawn_offset="-170,245"

[enemy_base]
entity_id="003"
spawn="EnemyBaseSpawn"

; Standard mode tempo:
; - Frequent small/medium waves instead of one huge blob.
; - Base-lane waves pressure tentacle base.
; - Side-lane waves keep home defense relevant.
; - Random player harassment keeps walking/skills relevant.
; - Trash is weaker/faster and gives less single-unit reward; total reward comes from throughput.

